<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
    }

    .calculator {
        background-color: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        width: 320px;
        padding: 20px;
    }

    .display {
        background-color: #e6e6fa; /* lilac */
        border-radius: 8px;
        padding: 15px;
        font-size: 2rem;
        text-align: right;
        margin-bottom: 20px;
        overflow-x: auto;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        padding: 20px;
        font-size: 1.2rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.1s;
    }

    button:active {
        transform: scale(0.95);
    }

    .number {
        background-color: #d8bfd8; /* light lilac */
        color: #000;
    }

    .operator {
        background-color: #9370db; /* medium lilac */
        color: #fff;
    }

    .equal {
        background-color: #6a5acd; /* dark lilac */
        color: #fff;
        grid-row: span 2;
    }

    .clear {
        background-color: #ff6b6b; /* red */
        color: #fff;
    }

    .pressed {
        transform: scale(0.95);
        opacity: 0.7;
    }
</style>
</head>
<body>
<div class="calculator">
    <div id="display" class="display">0</div>
    <div class="buttons">
        <!-- Row 1 -->
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="number" onclick="appendNumber('0')">0</button>
        <button class="number" onclick="appendNumber('.')">.</button>
        <button class="operator" onclick="appendOperator('/')">/</button>

        <!-- Row 2 -->
        <button class="number" onclick="appendNumber('7')">7</button>
        <button class="number" onclick="appendNumber('8')">8</button>
        <button class="number" onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="appendOperator('*')">*</button>

        <!-- Row 3 -->
        <button class="number" onclick="appendNumber('4')">4</button>
        <button class="number" onclick="appendNumber('5')">5</button>
        <button class="number" onclick="appendNumber('6')">6</button>
        <button class="operator" onclick="appendOperator('-')">-</button>

        <!-- Row 4 -->
        <button class="number" onclick="appendNumber('1')">1</button>
        <button class="number" onclick="appendNumber('2')">2</button>
        <button class="number" onclick="appendNumber('3')">3</button>
        <button class="operator" onclick="appendOperator('+')">+</button>

        <!-- Row 5 -->
        <button class="equal" onclick="calculateResult()">=</button>
    </div>
</div>

<script>
const display = document.getElementById('display');
let currentInput = '';

function appendNumber(number) {
    if (number === '.' && currentInput.includes('.')) return;
    if (currentInput === '0' && number !== '.') {
        currentInput = number;
    } else {
        currentInput += number;
    }
    display.textContent = currentInput;
}

function appendOperator(operator) {
    if (currentInput === '') return;
    const lastChar = currentInput[currentInput.length - 1];
    if ('+-*/'.includes(lastChar)) {
        currentInput = currentInput.slice(0, -1) + operator;
    } else {
        currentInput += operator;
    }
    display.textContent = currentInput;
}

function clearDisplay() {
    currentInput = '';
    display.textContent = '0';
}

function calculateResult() {
    try {
        if(currentInput === '') return;
        const result = Function('"use strict";return (' + currentInput + ')')();
        currentInput = result.toString();
        display.textContent = currentInput;
    } catch {
        display.textContent = 'Error';
        currentInput = '';
    }
}

// Keyboard Support
document.addEventListener('keydown', (e) => {
    const key = e.key;
    if (!isNaN(key) || key === '.') appendNumber(key);
    if (['+', '-', '*', '/'].includes(key)) appendOperator(key);
    if (key === 'Enter') calculateResult();
    if (key === 'Backspace') clearDisplay();
});
</script>
</body>
</html>
